{% load i18n %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f5f0eb;font-family:Georgia,'Times New Roman',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f0eb;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
               style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#1c1712;padding:28px 40px;text-align:center;">
              {% if logo %}<img src="{{ logo }}" alt="Saaf" width="56" height="56"
                   style="border-radius:8px;display:block;margin:0 auto 10px;border:0;">{% endif %}
              <span style="font-family:Georgia,serif;font-size:22px;color:#e8ddd3;letter-spacing:3px;display:block;">Saaf</span>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 40px;">
              {% block body %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9f5ef;padding:20px 40px;text-align:center;border-top:1px solid #e8ddd3;">
              <p style="margin:0;font-size:12px;color:#8a7a6e;line-height:1.7;">
                &copy; {% now "Y" %} Saaf &mdash; {% trans "Saudi Artisan Marketplace" %}<br>
                {% trans "You received this email because you have an account on Saaf." %}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
